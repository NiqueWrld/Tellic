  />

  <!-- download / pull arrow inside bubble -->
  <path
    d="M32 22v12m0 0l-5-5m5 5l5-5"
    stroke="#4F46E5"
    stroke-width="3.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <path
    d="M24 38h16"
    stroke="#4F46E5"
    stroke-width="3.2"
    stroke-linecap="round"
  />
