<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="WhatsApp Pull Chats logo">
  <defs>
    <linearGradient id="wpcBg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="wpcBubble" x1="12" y1="12" x2="52" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E0E7FF"/>
    </linearGradient>
  </defs>

  <!-- rounded square background -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#wpcBg)"/>

  <!-- chat bubble -->
  <path
    d="M32 12c-10.5 0-19 7.6-19 17 0 3.2 1 6.2 2.8 8.8L13 50l12.7-2.6c2 .8 4.1 1.2 6.3 1.2 10.5 0 19-7.6 19-17S42.5 12 32 12z"
