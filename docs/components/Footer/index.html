<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Footer — WhatsApp Pull Chats</title>
    <script>
        if (
            localStorage.theme === 'dark' ||
            (!('theme' in localStorage) &&
                window.matchMedia('(prefers-color-scheme: dark)').matches)
        ) {
            document.documentElement.classList.add('dark');
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' };</script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="h-full bg-gray-100 dark:bg-gray-900">
    <main class="p-4 text-gray-700 dark:text-gray-200">
        <p>Standalone preview of the <strong>Footer</strong> component.</p>
    </main>
    <div id="footer-host"></div>

    <script>
        fetch('footer.html').then(r => r.text()).then(html => {
            document.getElementById('footer-host').innerHTML = html;
        });
    </script>
</body>
</html>
